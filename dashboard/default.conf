## al-climate-dashboard nginx server config
## http request handling config

upstream rxburn-api { server rxburn-api:81; }

## args: cache_location cache_directory_hierarchy indexing_memory remove_after cache_memory
proxy_cache_path /var/cache/nginx/rxburn_data_cache levels=1:2 keys_zone=rxbdc:100m inactive=1d max_size=3g;

server {
    listen 80;

    ## Proxy data requests to the 'api' container
    location /api/ {
        proxy_pass http://rxburn-api/;  ## Service name == container name
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        ## indicate which cache keying zone to use (defined above)
        proxy_cache rxbdc;

        ## http status codes to cache, and how long (5 days)
        proxy_cache_valid 200 301 302 5d;

        ## serve stale cached values if api fails
        ##proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

        ## add headers to log indicating the cache behavior
        add_header X-Cache-Status $upstream_cache_status;

        ## include users' IP in a header so they can be uniquely identified and
        ## separately cached in the api
        proxy_set_header X-Real-IP $remote_addr;

        ## Return proper errors instead of index.html
        proxy_intercept_errors off;
    }

    ## serve static site
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ =404;
    }

}
